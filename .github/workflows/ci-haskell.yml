name: Haskell CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-guard:
    name: Repository Context Guard
    runs-on: [self-hosted, unified-all]
    timeout-minutes: 2
    steps:
      - name: Verify repository ownership
        run: |
          echo "Repository: ${{ github.repository }}"
          if [ "${{ github.repository }}" != "jalsarraf0/Haskell-Orchestrator" ] && \
             [ "${{ github.repository }}" != "Al-Sarraf-Tech/Haskell-Orchestrator" ]; then
            echo "::error::SECURITY VIOLATION: This workflow must only run in authorised Haskell-Orchestrator repositories."
            echo "::error::Detected repository: ${{ github.repository }}"
            exit 1
          fi
          echo "Repository context verified: ${{ github.repository }}"

  build-and-test:
    name: Build and Test
    runs-on: [self-hosted, unified-all]
    needs: repo-guard
    timeout-minutes: 30

    strategy:
      matrix:
        ghc: ['9.6.7']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set CABAL_DIR
        run: echo "CABAL_DIR=$HOME/.cabal" >> "$GITHUB_ENV"

      - name: Cache Cabal
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/packages
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-cabal-${{ matrix.ghc }}-${{ hashFiles('**/*.cabal', 'cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-cabal-${{ matrix.ghc }}-
            ${{ runner.os }}-cabal-

      - name: Update package index
        run: cabal update

      - name: Build
        run: cabal build all

      - name: Test
        run: cabal test all --test-show-details=direct

  build-macos:
    name: Build and Test (macOS)
    runs-on: macos-15
    needs: repo-guard
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Haskell
        uses: haskell-actions/setup@f9150cb1d140e9a9271700670baa38991e6fa25c # v2
        with:
          ghc-version: '9.6.7'
          cabal-version: '3.14'

      - name: Cache Cabal store
        uses: actions/cache@v4
        with:
          path: ~/.cabal/store
          key: macos-cabal-${{ hashFiles('*.cabal', 'cabal.project') }}
          restore-keys: |
            macos-cabal-

      - name: Update and build
        run: |
          cabal update
          cabal build all

      - name: Test
        run: cabal test all --test-show-details=direct

  lint:
    name: Lint
    runs-on: [self-hosted, unified-all]
    needs: repo-guard
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: HLint
        env:
          LANG: C.UTF-8
          LC_ALL: C.UTF-8
        run: hlint src/ app/ --no-exit-code 2>&1 | cat || true

  capability-check:
    name: Capability Contract Check
    runs-on: [self-hosted, unified-all]
    needs: repo-guard
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify no Business/Enterprise module imports
        run: |
          if grep -rI --include='*.hs' 'OrchestratorBusiness\|OrchestratorEnterprise' src/ app/ 2>/dev/null; then
            echo "::error::LEAK DETECTED: Source imports Business or Enterprise modules"
            exit 1
          fi
          if grep -rI --include='*.cabal' 'OrchestratorBusiness\|OrchestratorEnterprise' . 2>/dev/null; then
            echo "::error::LEAK DETECTED: .cabal file references Business or Enterprise modules"
            exit 1
          fi
          echo "Capability contract check passed — Community tier only"
