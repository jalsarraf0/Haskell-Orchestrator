name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.os-name }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os-name: linux
            arch: x86_64
            ext: ''
            archive: tar.gz
          - runner: ubuntu-24.04-arm
            os-name: linux
            arch: arm64
            ext: ''
            archive: tar.gz
          - runner: macos-15
            os-name: macos
            arch: arm64
            ext: ''
            archive: tar.gz
          - runner: windows-latest
            os-name: windows
            arch: x86_64
            ext: '.exe'
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6.7'
          cabal-version: '3.14'

      - name: Cache Cabal
        uses: actions/cache@v5
        with:
          path: |
            ~/.cabal/store
            dist-newstyle
          key: release-${{ matrix.os-name }}-${{ matrix.arch }}-${{ hashFiles('**/*.cabal', 'cabal.project') }}

      - name: Update and build
        run: |
          cabal update
          cabal build exe:orchestrator -O2

      - name: Run tests
        run: cabal test all --test-show-details=direct

      - name: Package artifact
        id: package
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BINARY=$(cabal list-bin orchestrator)
          PRODUCT="haskell-orchestrator"
          ASSET_NAME="${PRODUCT}-${VERSION}-${{ matrix.os-name }}-${{ matrix.arch }}"
          STAGING="staging/${ASSET_NAME}"
          mkdir -p "${STAGING}"

          cp "${BINARY}" "${STAGING}/orchestrator${{ matrix.ext }}"
          cp README.md LICENSE CHANGELOG.md "${STAGING}/"

          if [ "${{ matrix.archive }}" = "tar.gz" ]; then
            tar -czf "staging/${ASSET_NAME}.tar.gz" -C staging "${ASSET_NAME}"
            echo "asset=staging/${ASSET_NAME}.tar.gz" >> "$GITHUB_OUTPUT"
          else
            cd staging && 7z a -tzip "${ASSET_NAME}.zip" "${ASSET_NAME}/" && cd ..
            echo "asset=staging/${ASSET_NAME}.zip" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "asset_name=${ASSET_NAME}" >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        shell: bash
        run: |
          cd staging
          sha256sum *.tar.gz *.zip 2>/dev/null > SHA256SUMS.txt || true
          cat SHA256SUMS.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os-name }}-${{ matrix.arch }}
          path: |
            staging/*.tar.gz
            staging/*.zip
            staging/SHA256SUMS.txt
          retention-days: 5

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare release assets
        id: prep
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;
          cd release
          sha256sum * > "SHA256SUMS-${VERSION}.txt"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          ls -la

      - name: Setup Haskell (for SBOM)
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6.7'
          cabal-version: '3.14'

      - name: Generate SBOM
        run: |
          VERSION="${{ steps.prep.outputs.version }}"
          cabal update
          cabal freeze
          python3 << 'PYEOF'
          import json, re
          sbom = {
            "bomFormat": "CycloneDX",
            "specVersion": "1.5",
            "version": 1,
            "metadata": {
              "component": {
                "type": "application",
                "name": "haskell-orchestrator",
                "version": "${{ steps.prep.outputs.version }}"
              }
            },
            "components": []
          }
          with open("cabal.project.freeze") as f:
              for line in f:
                  m = re.search(r"any\.(\S+)\s+==(\S+)", line)
                  if m:
                      sbom["components"].append({
                          "type": "library",
                          "name": m.group(1),
                          "version": m.group(2)
                      })
          with open(f"release/sbom-{sbom['metadata']['component']['version']}.json", "w") as out:
              json.dump(sbom, out, indent=2)
          PYEOF

      - name: Attest artifacts
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'release/haskell-orchestrator-*'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Haskell Orchestrator v${{ steps.prep.outputs.version }}"
          body: |
            ## Haskell Orchestrator v${{ steps.prep.outputs.version }}

            Workflow standardization, drift detection, and remediation planning for GitHub Actions.

            ### Downloads

            | Platform | Architecture | File |
            |----------|-------------|------|
            | Linux | x86_64 | `haskell-orchestrator-${{ steps.prep.outputs.version }}-linux-x86_64.tar.gz` |
            | Linux | arm64 | `haskell-orchestrator-${{ steps.prep.outputs.version }}-linux-arm64.tar.gz` |
            | macOS | Apple Silicon (arm64) | `haskell-orchestrator-${{ steps.prep.outputs.version }}-macos-arm64.tar.gz` |
            | Windows | x86_64 | `haskell-orchestrator-${{ steps.prep.outputs.version }}-windows-x86_64.zip` |

            ### Verification

            ```bash
            sha256sum -c SHA256SUMS-${{ steps.prep.outputs.version }}.txt
            gh attestation verify haskell-orchestrator-${{ steps.prep.outputs.version }}-linux-x86_64.tar.gz --owner jalsarraf0
            ```

            ### Quick Start

            ```bash
            tar xzf haskell-orchestrator-${{ steps.prep.outputs.version }}-linux-x86_64.tar.gz
            cd haskell-orchestrator-${{ steps.prep.outputs.version }}-linux-x86_64
            ./orchestrator demo
            ./orchestrator scan /path/to/repo
            ```
          files: |
            release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
