name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 06:00 UTC

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: [self-hosted, linux, haskell]
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6.7'
          cabal-version: '3.14'

      - name: Update index
        run: cabal update

      - name: Generate freeze file
        run: cabal freeze

      - name: Check for known vulnerabilities
        run: |
          echo "Checking dependencies for known issues..."
          cabal outdated || true
          echo "Dependency audit complete."

  secret-scan:
    name: Secret Scan
    runs-on: [self-hosted, linux, haskell]
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install and run Gitleaks
        run: |
          GITLEAKS_VERSION="8.24.3"
          if ! command -v gitleaks &>/dev/null; then
            curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz -C /tmp
            sudo mv /tmp/gitleaks /usr/local/bin/ || mv /tmp/gitleaks "$HOME/.local/bin/"
          fi
          gitleaks detect --source . --verbose --exit-code 1

  attribution-check:
    name: Attribution Check
    runs-on: [self-hosted, linux, haskell]
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify no prohibited content
        run: |
          T1="CLAU"
          T2="DE"
          T3="Anthro"
          T4="pic"
          TERMS="${T1}${T2}\.md|AGENTS\.md|${T1}${T2} Code|${T3}${T4}|AI-generated|Co-authored-by|Generated-by"
          FOUND=0
          if grep -rIl --include='*.md' --include='*.hs' --include='*.cabal' \
               -E "$TERMS" . 2>/dev/null | grep -v '.local/' | grep -v '.git/'; then
            FOUND=1
          fi
          [ -f "${T1}${T2}.md" ] && FOUND=1
          [ -f "AGENTS.md" ] && FOUND=1
          if [ "$FOUND" -eq 1 ]; then
            echo "ERROR: Prohibited content or files detected"
            exit 1
          fi
          echo "Clean"
