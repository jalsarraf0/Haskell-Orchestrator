name: Haskell Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 06:00 UTC

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-guard:
    name: Repository Context Guard
    runs-on: [self-hosted, unified-all]
    timeout-minutes: 2
    steps:
      - name: Verify repository ownership
        run: |
          echo "Repository: ${{ github.repository }}"
          if [ "${{ github.repository }}" != "jalsarraf0/Haskell-Orchestrator" ] && \
             [ "${{ github.repository }}" != "Al-Sarraf-Tech/Haskell-Orchestrator" ]; then
            echo "::error::SECURITY VIOLATION: This workflow must only run in authorised Haskell-Orchestrator repositories."
            echo "::error::Detected repository: ${{ github.repository }}"
            exit 1
          fi
          echo "Repository context verified: ${{ github.repository }}"

  dependency-audit:
    name: Dependency Audit
    runs-on: [self-hosted, unified-all, haskell]
    needs: repo-guard
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set CABAL_DIR
        run: echo "CABAL_DIR=$HOME/.cabal" >> "$GITHUB_ENV"

      - name: Cache Cabal
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/packages
            ~/.cabal/store
          key: ${{ runner.os }}-cabal-security-${{ hashFiles('**/*.cabal', 'cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-cabal-security-
            ${{ runner.os }}-cabal-

      - name: Update index
        run: cabal update

      - name: Generate freeze file
        run: cabal freeze

      - name: Check for known vulnerabilities
        run: |
          echo "Checking dependencies for known issues..."
          cabal outdated || true
          echo "Dependency audit complete."

  secret-scan:
    name: Secret Scan
    runs-on: [self-hosted, unified-all]
    needs: repo-guard
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        run: gitleaks detect --source=. --no-banner --exit-code=1

  attribution-check:
    name: Attribution Check
    runs-on: [self-hosted, unified-all]
    needs: repo-guard
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify no prohibited content
        run: |
          T1="CLAU"
          T2="DE"
          T3="Anthro"
          T4="pic"
          TERMS="${T1}${T2}\.md|AGENTS\.md|${T1}${T2} Code|${T3}${T4}|AI-generated|Co-authored-by|Generated-by"
          FOUND=0
          if grep -rIl --include='*.md' --include='*.hs' --include='*.cabal' \
               -E "$TERMS" . 2>/dev/null | grep -v '.local/' | grep -v '.git/'; then
            FOUND=1
          fi
          [ -f "${T1}${T2}.md" ] && FOUND=1
          [ -f "AGENTS.md" ] && FOUND=1
          if [ "$FOUND" -eq 1 ]; then
            echo "ERROR: Prohibited content or files detected"
            exit 1
          fi
          echo "Clean"
