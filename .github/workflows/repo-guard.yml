name: Repository Context Guard

on:
  workflow_call:
    inputs:
      caller:
        description: "Name of the calling workflow (for audit logging)"
        required: false
        type: string
        default: "unknown"
    outputs:
      status:
        description: "Guard result — 'passed' if all checks succeed"
        value: ${{ jobs.repo-guard.outputs.status }}

permissions: {}

jobs:
  repo-guard:
    name: Repository Context Guard
    runs-on: [self-hosted, Linux, X64, haskell, unified-all]
    timeout-minutes: 2
    outputs:
      status: ${{ steps.result.outputs.status }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Verify repository ownership
        shell: bash
        run: |
          echo "Caller: ${{ inputs.caller }}"
          echo "Repository: ${{ github.repository }}"
          if [ "${{ github.repository }}" != "jalsarraf0/Haskell-Orchestrator" ] && \
             [ "${{ github.repository }}" != "Al-Sarraf-Tech/Haskell-Orchestrator" ]; then
            echo "::error::SECURITY VIOLATION: This workflow must only run in authorised Haskell-Orchestrator repositories."
            echo "::error::Detected repository: ${{ github.repository }}"
            exit 1
          fi
          echo "Repository context verified: ${{ github.repository }}"

      - name: Thermal safety check
        shell: bash
        run: |
          HOST=$(hostname | tr '[:upper:]' '[:lower:]')
          echo "Runner hostname: $HOST"
          # dominus and WSL2 are watercooled — thermal limit does not apply
          if [[ "$HOST" == "dominus" || "$HOST" == *"wsl"* ]]; then
            echo "Watercooled host ($HOST) — thermal check skipped"
            exit 0
          fi
          if command -v sensors &>/dev/null; then
            TEMP=$(sensors 2>/dev/null | grep -oP 'Package.*?\+\K[0-9]+' | head -1 || echo "0")
            echo "CPU temperature: ${TEMP}°C"
            if [ "${TEMP:-0}" -ge 70 ]; then
              echo "::error::THERMAL ABORT: CPU at ${TEMP}°C — exceeds 70°C hard limit (air-cooled host: $HOST)"
              exit 1
            fi
          else
            echo "sensors not available — thermal check skipped"
          fi

      - name: Set guard output
        id: result
        shell: bash
        run: echo "status=passed" >> "$GITHUB_OUTPUT"
