# Haskell Orchestrator — Capability Contract
# This manifest defines the formal ownership of every product capability.
# Validation scripts check code, docs, and CLI against this contract.
#
# Fields:
#   id:           Unique capability identifier (CAP-XXXX)
#   name:         Human-readable name
#   domain:       Capability domain (scanning, validation, policy, etc.)
#   description:  What the capability does
#   owner:        Tier that owns this capability (community, business, enterprise)
#   exposed_in:   List of tiers allowed to expose it
#   forbidden_in: List of tiers that must NOT expose it
#   cli_surface:  CLI commands/flags that implement it
#   modules:      Haskell modules that implement it
#   public_safe:  Whether this capability is safe for public/OSS release
#   governance:   Whether this is a governance-sensitive capability
#   admin_only:   Whether this requires admin/operator privileges
#   audit:        Whether this involves audit/compliance functionality

capabilities:

  # ── Scanning Domain ──

  - id: CAP-0001
    name: Single-repo scanning
    domain: scanning
    description: Scan a single repository for GitHub Actions workflow files
    owner: community
    exposed_in: [community, business, enterprise]
    forbidden_in: []
    cli_surface: ["orchestrator scan PATH"]
    modules: [Orchestrator.Scan]
    public_safe: true
    governance: false
    admin_only: false
    audit: false

  - id: CAP-0002
    name: Multi-repo batch scanning
    domain: scanning
    description: Scan multiple repositories in a single bounded-parallelism pass
    owner: business
    exposed_in: [business, enterprise]
    forbidden_in: [community]
    cli_surface: ["orchestrator-business batch PATH..."]
    modules: [OrchestratorBusiness.Batch]
    public_safe: false
    governance: false
    admin_only: false
    audit: false

  - id: CAP-0003
    name: Organisation-wide scanning
    domain: scanning
    description: Scan all repositories in a GitHub organisation with governance checks
    owner: enterprise
    exposed_in: [enterprise]
    forbidden_in: [community, business]
    cli_surface: ["orchestrator-enterprise admin scan"]
    modules: [OrchestratorEnterprise.Admin]
    public_safe: false
    governance: true
    admin_only: true
    audit: true

