# Intentionally insecure workflow for demo purposes
name: Release
on:
  push:
    branches: [main]
    tags: ['v*']

permissions: write-all

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v4
      - name: Publish
        run: echo "Publishing with token ${{ secrets.DEPLOY_TOKEN }}"
